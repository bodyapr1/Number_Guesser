name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Вимикаємо кешування через проблеми з платформозалежними пакетами
          # cache: 'npm'

      - name: Install dependencies (skip optional packages)
        run: |
          # Видаляємо package-lock.json для чистої установки
          rm -f package-lock.json
          # Встановлюємо без опціональних платформозалежних пакетів
          npm install --no-optional --legacy-peer-deps

      - name: Run linter
        run: npm run lint
        continue-on-error: true  # Тимчасово, якщо лінтер ще не налаштований

      - name: Run unit tests
        run: npm run test:unit

      - name: Build for production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/